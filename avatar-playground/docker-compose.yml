version: '3.8'

services:
  # Servidor Web (Nginx)
  web:
    image: nginx:alpine
    container_name: avatar_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/conf.d:/etc/nginx/conf.d
    networks:
      - avatar_network
    depends_on:
      - app

  # Aplicação (PHP-FPM)
  app:
    build:
      context: .
      dockerfile: ./docker/php/Dockerfile
    container_name: avatar_php
    restart: unless-stopped
    volumes:
      - ./:/var/www/html
    networks:
      - avatar_network
    depends_on:
      - db

  # Banco de Dados (MySQL)
  db:
    image: mysql:8.0
    container_name: avatar_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: avatar_db
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: avatar_user
      MYSQL_PASSWORD: secret_password
    ports:
      - "3306:3306"
    volumes:
      - avatar_mysql_data:/var/lib/mysql
    networks:
      - avatar_network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: avatar_phpmyadmin
    restart: unless-stopped
    ports:
      - "8081:80" # Acessaremos o painel na porta 8081
    environment:
      PMA_HOST: db # Aponta para o nome do serviço do MySQL no Docker
      PMA_USER: root # Usuário root que definimos no MySQL
      PMA_PASSWORD: root # Senha root que definimos no MySQL
    networks:
      - avatar_network
    depends_on:
      - db

# Definindo a rede interna para comunicação entre os contêineres
networks:
  avatar_network:
    driver: bridge

# Volume persistente para o banco de dados não zerar ao derrubar o contêiner
volumes:
  avatar_mysql_data: